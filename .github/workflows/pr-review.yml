name: AI PR Reviewer

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Only one review runs at a time per PR; newer pushes cancel the old run.
concurrency:
  group: pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  pull-requests: write
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest

    # Skip bots (Dependabot, Renovate, etc.) to avoid wasting API calls.
    if: |
      !contains(fromJSON('["dependabot[bot]","renovate[bot]","github-actions[bot]"]'),
                github.event.pull_request.user.login)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openai PyGithub

      - name: Run AI PR Review
        env:
          # ── OpenRouter config ────────────────────────────────────────────────
          # Add OPENROUTER_API_KEY as a repo secret (Settings → Secrets → Actions).
          # To swap models, change REVIEW_MODEL in repo variables — no code edits needed.
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          REVIEW_MODEL: ${{ vars.REVIEW_MODEL || 'qwen/qwen3-235b-a22b' }}

          # ── Cost controls ────────────────────────────────────────────────────
          # Hard limit: diffs larger than this get a "please split your PR" comment
          # instead of an AI call, capping per-review token spend.
          MAX_DIFF_LINES: ${{ vars.MAX_DIFF_LINES || '800' }}

          # ── PR metadata (passed via env to avoid shell injection) ─────────────
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO_FULL_NAME: ${{ github.repository }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: python .github/scripts/pr_reviewer.py
