name: AI PR Reviewer

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Only one review runs at a time per PR; a new push cancels the in-flight run.
concurrency:
  group: pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  pull-requests: write
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest

    # Skip bots (Dependabot, Renovate, etc.)
    if: |
      !contains(fromJSON('["dependabot[bot]","renovate[bot]","github-actions[bot]"]'),
                github.event.pull_request.user.login)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openai PyGithub

      - name: Run AI PR Review
        env:
          # ── OpenRouter ───────────────────────────────────────────────────────
          # Use a DEDICATED OpenRouter key for this reviewer (with its own spend
          # cap) so it can't consume your personal OpenRouter budget.
          # Create the key at: openrouter.ai/settings/keys
          #   Name:        video-analyzer-pr-reviewer
          #   Credit limit: e.g. $5/month
          # Then add it as a repo secret named OPENROUTER_PR_REVIEW_KEY.
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_PR_REVIEW_KEY }}

          # To swap models: Repo → Settings → Variables → Actions → REVIEW_MODEL
          # Any model slug from openrouter.ai/models works, no code changes needed.
          REVIEW_MODEL: ${{ vars.REVIEW_MODEL || 'qwen/qwen3-235b-a22b' }}

          # ── Cost controls ────────────────────────────────────────────────────
          # Diffs larger than this get a "please split" comment instead of an AI
          # call, capping worst-case token spend per review.
          MAX_DIFF_LINES: ${{ vars.MAX_DIFF_LINES || '800' }}

          # ── PR metadata (via env to prevent shell injection) ──────────────────
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO_FULL_NAME: ${{ github.repository }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_ACTION: ${{ github.event.action }}
        run: python .github/scripts/pr_reviewer.py
