name: AI PR Reviewer

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true
        type: number

# Only one review runs at a time per PR; a new push cancels the in-flight run.
concurrency:
  group: pr-review-${{ github.event.pull_request.number || inputs.pr_number }}
  cancel-in-progress: true

permissions:
  pull-requests: write
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest

    # Skip bots on automatic triggers (not applicable to manual dispatch)
    if: |
      github.event_name == 'workflow_dispatch' ||
      !contains(fromJSON('["dependabot[bot]","renovate[bot]","github-actions[bot]"]'),
                github.event.pull_request.user.login)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openai PyGithub PyYAML

      - name: Fetch PR metadata (manual dispatch only)
        if: github.event_name == 'workflow_dispatch'
        id: pr_meta
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: ${{ inputs.pr_number }}
            });
            core.setOutput('title',    pr.data.title);
            core.setOutput('body',     pr.data.body || '');
            core.setOutput('author',   pr.data.user.login);
            core.setOutput('head_sha', pr.data.head.sha);

      - name: Run AI PR Review
        env:
          # ── OpenRouter ───────────────────────────────────────────────────────
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_PR_REVIEW_KEY }}
          REVIEW_MODEL: ${{ vars.REVIEW_MODEL || 'qwen/qwen3-235b-a22b' }}

          # ── Cost controls ────────────────────────────────────────────────────
          MAX_DIFF_LINES: ${{ vars.MAX_DIFF_LINES || '800' }}

          # ── PR metadata ───────────────────────────────────────────────────────
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER:    ${{ github.event.pull_request.number  || inputs.pr_number }}
          REPO_FULL_NAME: ${{ github.repository }}
          PR_TITLE:     ${{ github.event.pull_request.title   || steps.pr_meta.outputs.title }}
          PR_BODY:      ${{ github.event.pull_request.body    || steps.pr_meta.outputs.body }}
          PR_AUTHOR:    ${{ github.event.pull_request.user.login || steps.pr_meta.outputs.author }}
          PR_HEAD_SHA:  ${{ github.event.pull_request.head.sha  || steps.pr_meta.outputs.head_sha }}
          PR_ACTION:    ${{ github.event.action || 'opened' }}
        run: python .github/scripts/pr_reviewer.py
